version: 2

updates:
  # ─────────────────────────────────────────────────────────
  # Frontend: Next.js landing page (npm)
  # ─────────────────────────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/src/frontend/lp"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(deps)"
    groups:
      types:
        patterns:
          - "@types/*"
        update-types:
          - "minor"
          - "patch"
      eslint:
        patterns:
          - "eslint*"
        update-types:
          - "minor"
          - "patch"
      dev-minor-patch:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"

  # ─────────────────────────────────────────────────────────
  # Backend: Python via uv
  # Only dev deps today (mypy, ruff); grouping would be overkill.
  # ─────────────────────────────────────────────────────────
  - package-ecosystem: "uv"
    directory: "/src/backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"

  # ─────────────────────────────────────────────────────────
  # Infrastructure: Terraform
  # Directory currently has no .tf files; config is pre-staged.
  # ─────────────────────────────────────────────────────────
  - package-ecosystem: "terraform"
    directory: "/infrastructure/terraform"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
    groups:
      terraform-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # ─────────────────────────────────────────────────────────
  # GitHub Actions
  # ─────────────────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
    groups:
      actions-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
